<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c770f0"/>
      <stop offset="100%" style="stop-color:#9b40cc"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="250" cy="250" r="250" fill="url(#bgGrad)"/>

  <!-- Decorative rings -->
  <circle cx="250" cy="250" r="220" fill="none" stroke="#c770f0" stroke-width="1" opacity="0.15"/>
  <circle cx="250" cy="250" r="195" fill="none" stroke="#c770f0" stroke-width="1" opacity="0.1"/>

  <!-- Floating dots -->
  <circle cx="60"  cy="100" r="4" fill="#c770f0" opacity="0.5"/>
  <circle cx="430" cy="80"  r="3" fill="#c770f0" opacity="0.4"/>
  <circle cx="50"  cy="370" r="5" fill="#c770f0" opacity="0.3"/>
  <circle cx="440" cy="400" r="3" fill="#c770f0" opacity="0.5"/>

  <!-- Body / shirt -->
  <path d="M 108 500 L 108 400 Q 108 345 165 325 L 200 312 L 250 318 L 300 312 L 335 325 Q 392 345 392 400 L 392 500 Z" fill="url(#shirtGrad)"/>

  <!-- Collar -->
  <path d="M 200 318 Q 250 340 300 318" stroke="white" stroke-width="2" fill="none" opacity="0.4"/>

  <!-- Neck -->
  <rect x="232" y="272" width="36" height="52" rx="18" fill="#d4956a"/>

  <!-- Ears -->
  <ellipse cx="170" cy="228" rx="13" ry="17" fill="#d4956a"/>
  <ellipse cx="330" cy="228" rx="13" ry="17" fill="#d4956a"/>

  <!-- Head / face -->
  <ellipse cx="250" cy="220" rx="82" ry="86" fill="#e8b48a"/>

  <!-- Long dark hair back layer -->
  <path d="M 172 185 C 155 270 158 365 162 415" stroke="#150800" stroke-width="38" fill="none" stroke-linecap="round"/>
  <path d="M 328 185 C 345 270 342 365 338 415" stroke="#150800" stroke-width="38" fill="none" stroke-linecap="round"/>

  <!-- Hair top -->
  <path d="M 170 195 C 170 118 250 90 330 195 C 342 215 336 238 324 222 C 308 192 274 175 250 175 C 226 175 192 192 176 222 C 164 238 158 215 170 195 Z" fill="#150800"/>

  <!-- Hair parting -->
  <path d="M 250 130 L 250 175" stroke="#2d1000" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M 208 198 Q 222 192 236 198" stroke="#1a0a00" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 264 198 Q 278 192 292 198" stroke="#1a0a00" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Eye whites -->
  <ellipse cx="220" cy="218" rx="14" ry="13" fill="white"/>
  <ellipse cx="280" cy="218" rx="14" ry="13" fill="white"/>

  <!-- Iris -->
  <circle cx="222" cy="220" r="9" fill="#1a0a00"/>
  <circle cx="282" cy="220" r="9" fill="#1a0a00"/>

  <!-- Eye shine -->
  <circle cx="226" cy="215" r="3" fill="white" opacity="0.9"/>
  <circle cx="286" cy="215" r="3" fill="white" opacity="0.9"/>

  <!-- Eyelashes -->
  <path d="M 207 207 Q 220 202 233 207" stroke="#1a0a00" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 267 207 Q 280 202 293 207" stroke="#1a0a00" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M 246 235 Q 244 248 248 252 Q 252 254 256 252 Q 260 248 254 235" stroke="#c07a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Lips -->
  <path d="M 230 267 Q 250 260 270 267" stroke="#c07a50" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 228 270 Q 250 284 272 270" stroke="#c07a50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 228 270 Q 250 275 272 270" fill="#e07a70" opacity="0.6"/>

  <!-- Blush -->
  <ellipse cx="200" cy="244" rx="16" ry="8" fill="#e07a70" opacity="0.18"/>
  <ellipse cx="300" cy="244" rx="16" ry="8" fill="#e07a70" opacity="0.18"/>

  <!-- Earrings -->
  <circle cx="170" cy="238" r="5" fill="#c770f0"/>
  <line x1="170" y1="243" x2="170" y2="252" stroke="#c770f0" stroke-width="2"/>
  <circle cx="170" cy="254" r="3" fill="#e0a0ff"/>
  <circle cx="330" cy="238" r="5" fill="#c770f0"/>
  <line x1="330" y1="243" x2="330" y2="252" stroke="#c770f0" stroke-width="2"/>
  <circle cx="330" cy="254" r="3" fill="#e0a0ff"/>

  <!-- Laptop -->
  <rect x="148" y="362" width="204" height="128" rx="8" fill="#1e1b4b"/>
  <rect x="156" y="370" width="188" height="98" rx="4" fill="#0d0d1f"/>

  <!-- Code lines on screen -->
  <rect x="165" y="382" width="72"  height="5" rx="2.5" fill="#c770f0" opacity="0.9"/>
  <rect x="165" y="394" width="100" height="5" rx="2.5" fill="#38bdf8" opacity="0.9"/>
  <rect x="175" y="406" width="56"  height="5" rx="2.5" fill="#f472b6" opacity="0.9"/>
  <rect x="175" y="418" width="88"  height="5" rx="2.5" fill="#c770f0" opacity="0.9"/>
  <rect x="165" y="430" width="64"  height="5" rx="2.5" fill="#34d399" opacity="0.9"/>
  <rect x="165" y="442" width="48"  height="5" rx="2.5" fill="#38bdf8" opacity="0.9"/>

  <!-- Cursor -->
  <rect x="213" y="442" width="3" height="10" rx="1" fill="white" opacity="0.8"/>

  <!-- Laptop base -->
  <rect x="130" y="488" width="240" height="12" rx="6" fill="#1e1b4b"/>
</svg>
